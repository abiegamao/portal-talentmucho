<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentMucho — Landing Page UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #FAF8F5;
    color: #2A2520;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  /* Fade-in-up animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tm-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
  /* Prevent image drag */
  img { user-select: none; -webkit-user-drag: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ServicesSection.jsx"></script>
<script type="text/babel" src="ProcessSection.jsx"></script>
<script type="text/babel" src="TestimonialsSection.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* ── ClientsSection ─────────────────────────────────────── */
function ClientsSection() {
  const clients = ['Founders & CEOs','Coaches & Consultants','Agencies','E-commerce Brands','Service-Based Businesses','Startups Ready to Scale'];
  return (
    <section style={{ padding: '3.5rem 0', background: '#F5F0E8', borderTop: '1px solid #EBE4D8', borderBottom: '1px solid #EBE4D8' }}>
      <div style={{ maxWidth: '72rem', margin: '0 auto', padding: '0 3rem' }}>
        <p style={{ textAlign: 'center', color: '#9C8B7A', fontSize: '10px', fontWeight: 600, letterSpacing: '0.25em', textTransform: 'uppercase', marginBottom: '1.5rem' }}>
          Trusted by builders worldwide
        </p>
        <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '10px', marginBottom: '2rem' }}>
          {clients.map((c, i) => (
            <span key={i} style={{
              padding: '8px 18px', background: '#FFFFFF', border: '1px solid #DED4C4',
              borderRadius: '9999px', fontSize: '13px', fontWeight: 500, color: '#3D352E',
              cursor: 'default', transition: 'all 300ms',
            }}
              onMouseEnter={e => { e.target.style.borderColor = '#7D6B5A'; e.target.style.color = '#7D6B5A'; }}
              onMouseLeave={e => { e.target.style.borderColor = '#DED4C4'; e.target.style.color = '#3D352E'; }}
            >{c}</span>
          ))}
        </div>
        <p style={{ textAlign: 'center', color: '#9C8B7A', fontFamily: "'Cormorant Garamond', serif", fontSize: '1.2rem', fontStyle: 'italic', maxWidth: '36rem', margin: '0 auto', lineHeight: 1.6 }}>
          &ldquo;If you&apos;re juggling everything yourself, we&apos;re here for you.&rdquo;
        </p>
      </div>
    </section>
  );
}

/* ── WhoWeAreSection ────────────────────────────────────── */
function WhoWeAreSection() {
  const highlights = [
    { icon: '👥', title: 'Top-Tier Talent', desc: 'Carefully vetted virtual professionals seamlessly integrated into your workflow.' },
    { icon: '🚀', title: 'Strategic Execution', desc: "We don't just do tasks — we implement strategies that accelerate growth." },
    { icon: '🛡', title: 'Zero Chaos', desc: 'Scale smoothly with proven systems and reliable, accountable management.' },
  ];
  return (
    <section style={{ padding: '5rem 0', background: '#2A2520', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', top: 0, left: 0, width: '600px', height: '400px', background: 'rgb(125 107 90 / 0.06)', borderRadius: '50%', filter: 'blur(120px)', pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', bottom: 0, right: 0, width: '400px', height: '400px', background: 'rgb(82 70 57 / 0.12)', borderRadius: '50%', filter: 'blur(80px)', pointerEvents: 'none' }} />
      <div style={{ maxWidth: '72rem', margin: '0 auto', padding: '0 3rem', position: 'relative', zIndex: 1 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4rem', alignItems: 'center' }}>
          <div>
            <p style={{ color: '#7D6B5A', fontSize: '11px', fontWeight: 600, letterSpacing: '0.25em', textTransform: 'uppercase', marginBottom: '1.25rem' }}>The Talent Mucho Way</p>
            <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: 'clamp(2.2rem,4vw,3.5rem)', color: '#FAF8F5', lineHeight: 1.1, marginBottom: '1.5rem' }}>
              More Than Staffing.<br />
              We&apos;re Your <em style={{ fontStyle: 'italic', color: '#a89080' }}>Growth Team.</em>
            </h2>
            <div style={{ marginBottom: '2.5rem' }}>
              <p style={{ fontSize: '1.0625rem', color: '#FAF8F5', borderLeft: '2px solid #7D6B5A', paddingLeft: '1.25rem', marginBottom: '1.25rem', lineHeight: 1.7 }}>
                Most agencies stop at &ldquo;here&apos;s your VA.&rdquo; We build around your outcomes.
              </p>
              <p style={{ fontSize: '1rem', color: 'rgb(250 248 245 / 0.65)', lineHeight: 1.7 }}>
                Talent Mucho blends top-tier virtual professionals with strategic digital services — helping founders and growing businesses scale without the chaos.
              </p>
            </div>
            <a href="#services" style={{
              display: 'inline-flex', alignItems: 'center', gap: '8px',
              padding: '12px 28px', background: '#7D6B5A', color: '#FAF8F5',
              borderRadius: '10px', fontSize: '14px', fontWeight: 500, textDecoration: 'none',
              boxShadow: '0 8px 24px rgb(125 107 90 / 0.25)', transition: 'all 300ms',
            }}
              onMouseEnter={e => { e.currentTarget.style.background = '#665847'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = '#7D6B5A'; e.currentTarget.style.transform = 'translateY(0)'; }}
            >
              Explore Our Services
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m9 18 6-6-6-6"/></svg>
            </a>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '1.25rem' }}>
            {highlights.map((h, i) => (
              <div key={i} style={{
                display: 'flex', gap: '1.25rem', alignItems: 'flex-start',
                background: 'rgb(82 70 57 / 0.4)', border: '1px solid rgb(250 248 245 / 0.08)',
                borderRadius: '1rem', padding: '1.5rem', transition: 'all 500ms',
              }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'rgb(125 107 90 / 0.3)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'rgb(250 248 245 / 0.08)'}
              >
                <div style={{ width: '42px', height: '42px', borderRadius: '10px', background: 'rgb(125 107 90 / 0.2)', border: '1px solid rgb(125 107 90 / 0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '18px', flexShrink: 0 }}>{h.icon}</div>
                <div>
                  <div style={{ fontWeight: 600, color: '#FAF8F5', marginBottom: '4px', fontSize: '15px' }}>{h.title}</div>
                  <div style={{ fontSize: '13px', color: 'rgb(250 248 245 / 0.65)', lineHeight: 1.6 }}>{h.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── App ─────────────────────────────────────────────────── */
function App() {
  return (
    <>
      <Navbar />
      <main>
        <Hero />
        <ClientsSection />
        <WhoWeAreSection />
        <ServicesSection />
        <ProcessSection />
        <TestimonialsSection />
        <CTASection />
      </main>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
