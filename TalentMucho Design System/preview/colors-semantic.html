<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .token { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: white; border: 1px solid #EBE4D8; border-radius: 10px; }
  .dot { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; border: 1px solid rgb(0 0 0 / 0.07); }
  .info { display: flex; flex-direction: column; gap: 2px; }
  .name { font-size: 11px; font-weight: 600; color: #2A2520; }
  .desc { font-size: 10px; color: #9C8B7A; }
</style>
</head>
<body>
  <div class="row">
    <div class="token"><div class="dot" style="background:#FAF8F5;"></div><div class="info"><span class="name">--color-bg</span><span class="desc">Page background</span></div></div>
    <div class="token"><div class="dot" style="background:#F5F0E8;"></div><div class="info"><span class="name">--color-bg-alt</span><span class="desc">Section alt</span></div></div>
    <div class="token"><div class="dot" style="background:#2A2520;"></div><div class="info"><span class="name">--color-bg-dark</span><span class="desc">Dark sections</span></div></div>
    <div class="token"><div class="dot" style="background:#FFFFFF;"></div><div class="info"><span class="name">--color-surface</span><span class="desc">Card bg</span></div></div>
    <div class="token"><div class="dot" style="background:#3D352E;"></div><div class="info"><span class="name">--color-fg-body</span><span class="desc">Body text</span></div></div>
    <div class="token"><div class="dot" style="background:#9C8B7A;"></div><div class="info"><span class="name">--color-fg-muted</span><span class="desc">Secondary text</span></div></div>
    <div class="token"><div class="dot" style="background:#7D6B5A;"></div><div class="info"><span class="name">--color-accent</span><span class="desc">Primary CTA / links</span></div></div>
    <div class="token"><div class="dot" style="background:#665847;"></div><div class="info"><span class="name">--color-accent-hover</span><span class="desc">Hover state</span></div></div>
    <div class="token"><div class="dot" style="background:#EBE4D8;"></div><div class="info"><span class="name">--color-border</span><span class="desc">Card borders</span></div></div>
  </div>
</body>
</html>
