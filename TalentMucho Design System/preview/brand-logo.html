<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 20px 24px; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .block { border-radius: 14px; padding: 20px 24px; display: flex; flex-direction: column; justify-content: center; }
  .label { font-size: 10px; font-weight: 600; color: #9C8B7A; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="block" style="background: #FAF8F5; border: 1px solid #EBE4D8; flex: 1;">
      <div class="label">Logo — light bg</div>
      <img src="../assets/tm-logo.png" alt="TalentMucho" style="height: 40px; width: auto; object-fit: contain; display: block;">
    </div>
    <div class="block" style="background: #2A2520; flex: 1;">
      <div class="label" style="color: rgb(250 248 245 / 0.4);">Logo — dark bg (inverted)</div>
      <img src="../assets/tm-logo.png" alt="TalentMucho" style="height: 40px; width: auto; object-fit: contain; display: block; filter: brightness(0) invert(1); opacity: 0.9;">
    </div>
    <div class="block" style="background: #F5F0E8; border: 1px solid #EBE4D8; flex: 2;">
      <div class="label">Tagline</div>
      <div style="font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 22px; color: #2A2520; line-height: 1.2;">
        "You've worked too hard to<br>keep doing it alone."
      </div>
      <div style="margin-top: 10px; font-size: 11px; color: #9C8B7A; letter-spacing: 0.1em;">TALENT MUCHO &nbsp;·&nbsp; Torrevieja, Spain &amp; Cagayan de Oro, PH</div>
    </div>
    <div class="block" style="background: #7D6B5A; flex: 1;">
      <div class="label" style="color: rgb(250 248 245 / 0.6);">Brand accent</div>
      <div style="font-family: 'Manrope', sans-serif; font-size: 28px; font-weight: 700; color: white; letter-spacing: -0.02em;">clay-500</div>
      <div style="font-size: 12px; color: rgb(250 248 245 / 0.7); margin-top: 4px;">#7D6B5A</div>
    </div>
  </div>
</body>
</html>
