<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 20px 24px; }
  .examples { display: flex; flex-direction: column; gap: 18px; }
  .pair { display: flex; flex-direction: column; gap: 4px; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: #7D6B5A; }
  .heading { font-family: 'Cormorant Garamond', serif; font-weight: 300; color: #2A2520; line-height: 1.05; }
  .row { display: flex; gap: 32px; }
</style>
</head>
<body>
  <div class="row">
    <div class="examples">
      <div class="pair">
        <div class="eyebrow">What We Offer</div>
        <div class="heading" style="font-size:32px;">Scale Your Operations<br><em style="color:#7D6B5A; font-size:24px;">Without the Overhead</em></div>
      </div>
    </div>
    <div style="width:1px; background:#EBE4D8; flex-shrink:0;"></div>
    <div class="examples">
      <div class="pair">
        <div class="eyebrow">Our Philosophy</div>
        <div class="heading" style="font-size:32px;">Hiring should feel <em style="color:#7D6B5A;">human</em></div>
      </div>
    </div>
    <div style="width:1px; background:#EBE4D8; flex-shrink:0;"></div>
    <div class="examples">
      <div class="pair">
        <div class="eyebrow">How It Works</div>
        <div class="heading" style="font-size:32px;">Simple. Strategic.<br><em style="color:#7D6B5A;">Scalable.</em></div>
      </div>
    </div>
  </div>
</body>
</html>
