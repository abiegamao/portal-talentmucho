<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #F5F0E8; padding: 28px 24px; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 90px; height: 72px; background: white; border-radius: 16px; }
  .label { font-size: 10px; font-weight: 600; color: #524639; }
  .desc { font-size: 9px; color: #9C8B7A; text-align: center; max-width: 90px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="box" style="box-shadow: none; border: 1px solid #EBE4D8;"></div>
      <div class="label">none</div>
      <div class="desc">border only</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 1px 2px 0 rgb(61 53 46 / 0.05);"></div>
      <div class="label">shadow-sm</div>
      <div class="desc">card default</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 4px 6px -1px rgb(61 53 46 / 0.07), 0 2px 4px -2px rgb(61 53 46 / 0.07);"></div>
      <div class="label">shadow-md</div>
      <div class="desc">btn, hover state</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 10px 15px -3px rgb(61 53 46 / 0.08), 0 4px 6px -4px rgb(61 53 46 / 0.08);"></div>
      <div class="label">shadow-lg</div>
      <div class="desc">dropdown, btn hover</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 20px 25px -5px rgb(61 53 46 / 0.08), 0 8px 10px -6px rgb(61 53 46 / 0.05);"></div>
      <div class="label">shadow-xl</div>
      <div class="desc">CTA btn dark bg</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 20px 40px -10px rgb(61 53 46 / 0.10), 0 10px 15px -5px rgb(61 53 46 / 0.05);"></div>
      <div class="label">shadow-elegant</div>
      <div class="desc">bento hover</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 8px 24px -4px rgb(125 107 90 / 0.25);"></div>
      <div class="label">shadow-clay</div>
      <div class="desc">CTA on dark bg</div>
    </div>
    <div class="item" style="margin-left:8px;">
      <div style="display:flex; flex-direction:column; gap:4px; background:white; border-radius:12px; padding:10px 14px; box-shadow: 0 4px 6px -1px rgb(61 53 46 / 0.07);">
        <div style="font-size:9px; color:#9C8B7A; font-weight:600;">Base tint</div>
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="width:20px; height:20px; background:#3D352E; border-radius:4px;"></div>
          <div style="font-size:9px; color:#524639;">rgb(61 53 46) — espresso-800<br>Warm, never cool-gray</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
