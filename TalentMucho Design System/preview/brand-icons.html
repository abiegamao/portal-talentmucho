<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 18px 22px; }
  .section { margin-bottom: 14px; }
  .section-label { font-size: 10px; font-weight: 600; color: #9C8B7A; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .icon-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .icon-item { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 52px; }
  .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .icon-box-light { background: #F5F0E8; border: 1px solid #EBE4D8; color: #7D6B5A; }
  .icon-box-dark { background: #2A2520; color: #7D6B5A; }
  .icon-box-clay { background: #7D6B5A; color: white; }
  .icon-name { font-size: 8px; color: #9C8B7A; text-align: center; line-height: 1.3; }
  .social-row { display: flex; gap: 8px; }
  .social-icon { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #EBE4D8; background: rgb(250 248 245 / 0.06); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  svg { width: 18px; height: 18px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Lucide Icons — Primary (stroke, 2px, clay-500)</div>
    <div class="icon-row" id="icons-light"></div>
  </div>
  <div class="section">
    <div class="section-label">Icon containers — light / clay / dark variants</div>
    <div class="icon-row" id="icons-variants"></div>
  </div>
  <div class="section">
    <div class="section-label">Social icons (react-icons) — footer circles</div>
    <div style="display:flex;gap:8px;align-items:center;background:#2A2520;padding:12px 16px;border-radius:10px;">
      <div class="social-icon" style="border-color:rgb(250 248 245 / 0.1);background:rgb(250 248 245 / 0.05);color:rgb(250 248 245 / 0.7);">W</div>
      <div class="social-icon" style="border-color:rgb(250 248 245 / 0.1);background:rgb(250 248 245 / 0.05);color:rgb(250 248 245 / 0.7);">f</div>
      <div class="social-icon" style="border-color:rgb(250 248 245 / 0.1);background:rgb(250 248 245 / 0.05);color:rgb(250 248 245 / 0.7);">📷</div>
      <div class="social-icon" style="border-color:rgb(250 248 245 / 0.1);background:rgb(250 248 245 / 0.05);color:rgb(250 248 245 / 0.7);">TT</div>
      <div class="social-icon" style="border-color:rgb(250 248 245 / 0.1);background:rgb(250 248 245 / 0.05);color:rgb(250 248 245 / 0.7);">⊚</div>
      <span style="font-size:10px;color:rgb(250 248 245 / 0.4);margin-left:8px;">WhatsApp · Facebook · Instagram · TikTok · Threads<br>Each gets brand hover color + scale-110</span>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const iconNames = ['check-circle','arrow-right','arrow-up-right','map-pin','user-check','cpu','share-2','layout-template','trending-up','zap','brain','clock','layers','users','rocket','shield-check','target','briefcase','star','book-text'];
    const light = document.getElementById('icons-light');
    iconNames.forEach(name => {
      const item = document.createElement('div');
      item.className = 'icon-item';
      item.innerHTML = `<div class="icon-box icon-box-light"><i data-lucide="${name}" style="width:18px;height:18px;color:#7D6B5A;stroke-width:2"></i></div><div class="icon-name">${name}</div>`;
      light.appendChild(item);
    });
    const variants = document.getElementById('icons-variants');
    const variantData = [
      {cls:'icon-box-light', label:'Light bg\n(default)'},
      {cls:'icon-box-clay', label:'Clay bg\n(dark card)'},
      {cls:'icon-box-dark', label:'Dark bg\n(process)'},
    ];
    variantData.forEach(v => {
      const item = document.createElement('div');
      item.className = 'icon-item';
      item.style.width = '72px';
      item.innerHTML = `<div class="icon-box ${v.cls}" style="width:52px;height:52px;border-radius:16px;"><i data-lucide="zap" style="width:22px;height:22px;stroke-width:2"></i></div><div class="icon-name">${v.label}</div>`;
      variants.appendChild(item);
    });
    lucide.createIcons();
  </script>
</body>
</html>
