<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 20px 24px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: #EBE4D8; border: 1.5px solid #DED4C4; }
  .label { font-size: 10px; font-weight: 600; color: #524639; text-align: center; }
  .val { font-size: 9px; color: #9C8B7A; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0;"></div><div class="label">none</div><div class="val">0</div></div>
    <div class="item"><div class="box" style="border-radius:6px;"></div><div class="label">sm</div><div class="val">6px · tags</div></div>
    <div class="item"><div class="box" style="border-radius:8px;"></div><div class="label">md</div><div class="val">8px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:12px;"></div><div class="label">lg</div><div class="val">12px · btns</div></div>
    <div class="item"><div class="box" style="border-radius:16px;"></div><div class="label">xl</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="border-radius:24px;"></div><div class="label">2xl</div><div class="val">24px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:32px;"></div><div class="label">3xl</div><div class="val">32px</div></div>
    <div class="item"><div class="box" style="border-radius:40px;"></div><div class="label">4xl</div><div class="val">40px · bento</div></div>
    <div class="item"><div class="box" style="border-radius:9999px; width:72px;"></div><div class="label">full</div><div class="val">pill · nav</div></div>
    <div class="item" style="margin-left:auto;">
      <div style="background:white; border:1.5px solid #EBE4D8; border-radius:24px; padding:12px 16px;">
        <div style="font-size:11px; color:#9C8B7A; font-weight:500; margin-bottom:4px;">Card default</div>
        <div style="font-size:11px; color:#2A2520; font-weight:600;">rounded-2xl · 24px</div>
      </div>
    </div>
    <div class="item">
      <div style="background:white; border:1.5px solid #EBE4D8; border-radius:40px; padding:12px 16px;">
        <div style="font-size:11px; color:#9C8B7A; font-weight:500; margin-bottom:4px;">Bento default</div>
        <div style="font-size:11px; color:#2A2520; font-weight:600;">rounded-[2.5rem] · 40px</div>
      </div>
    </div>
  </div>
</body>
</html>
