<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cormorant Garamond', serif; background: #FAF8F5; padding: 24px 28px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 20px; }
  .specimen { color: #2A2520; line-height: 1.1; }
  .meta { font-family: 'Manrope', sans-serif; font-size: 10px; color: #9C8B7A; font-weight: 500; white-space: nowrap; min-width: 90px; }
  .divider { height: 1px; background: #EBE4D8; margin: 4px 0; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <span class="meta">72px / 300</span>
      <div class="specimen" style="font-size:56px; font-weight:300;">Scale Without the <em style="color:#7D6B5A">Stress.</em></div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <span class="meta">48px / 300</span>
      <div class="specimen" style="font-size:40px; font-weight:300;">Your Business Deserves a Team</div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <span class="meta">36px / 400</span>
      <div class="specimen" style="font-size:30px; font-weight:400;">Hiring should feel <em style="color:#7D6B5A">human</em></div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <span class="meta">28px / 400</span>
      <div class="specimen" style="font-size:24px; font-weight:400;">Discovery Call · Custom Solution</div>
    </div>
  </div>
</body>
</html>
