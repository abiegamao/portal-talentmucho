<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 20px 24px; }
  .section { margin-bottom: 16px; }
  .section-label { font-size: 10px; font-weight: 600; color: #9C8B7A; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Manrope', sans-serif; font-weight: 500; cursor: pointer; border: none; text-decoration: none; }
  .btn-primary { background: #7D6B5A; color: #FAF8F5; padding: 12px 24px; border-radius: 8px; font-size: 15px; box-shadow: 0 4px 6px -1px rgb(61 53 46 / 0.15); }
  .btn-primary-pill { background: #7D6B5A; color: #FAF8F5; padding: 10px 22px; border-radius: 9999px; font-size: 14px; box-shadow: 0 4px 6px -1px rgb(61 53 46 / 0.15); }
  .btn-secondary { background: transparent; color: #7D6B5A; padding: 12px 24px; border-radius: 8px; font-size: 15px; border: 1px solid #7D6B5A; }
  .btn-dark { background: #2A2520; color: #FAF8F5; padding: 12px 24px; border-radius: 9999px; font-size: 14px; }
  .btn-inverse { background: #FAF8F5; color: #2A2520; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; box-shadow: 0 20px 25px -5px rgb(61 53 46 / 0.15); }
  .btn-sm { background: #7D6B5A; color: #FAF8F5; padding: 8px 16px; border-radius: 8px; font-size: 13px; }
  .dark-row { background: #2A2520; padding: 16px 18px; border-radius: 12px; }
  .arrow { font-size: 14px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">On light background</div>
    <div class="row">
      <a class="btn btn-primary">Book a Call <span class="arrow">→</span></a>
      <a class="btn btn-primary-pill">Get Your Free VA Match <span class="arrow">→</span></a>
      <a class="btn btn-secondary">Learn More</a>
      <a class="btn btn-dark">Explore Our Plans <span class="arrow">→</span></a>
      <a class="btn btn-sm">Book →</a>
    </div>
  </div>
  <div class="section">
    <div class="section-label">On dark background</div>
    <div class="dark-row">
      <div class="row">
        <a class="btn btn-inverse">Book Your Free Call — Get a Custom Staffing Plan <span class="arrow">↗</span></a>
        <a class="btn btn-primary-pill">Start with a Free Call <span class="arrow">→</span></a>
      </div>
    </div>
  </div>
</body>
</html>
