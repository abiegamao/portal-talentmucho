<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #FAF8F5; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .color { height: 64px; border-radius: 10px; border: 1px solid rgb(0 0 0 / 0.06); }
  .label { font-size: 10px; font-weight: 600; color: #524639; letter-spacing: 0.02em; }
  .hex { font-size: 10px; color: #9C8B7A; font-weight: 400; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="color" style="background:#FAF8F5;"></div>
      <div class="label">beige-50</div>
      <div class="hex">#FAF8F5</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#F5F0E8;"></div>
      <div class="label">beige-100</div>
      <div class="hex">#F5F0E8</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#EBE4D8;"></div>
      <div class="label">beige-200</div>
      <div class="hex">#EBE4D8</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#DED4C4;"></div>
      <div class="label">beige-300</div>
      <div class="hex">#DED4C4</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#9C8B7A;"></div>
      <div class="label">taupe-400</div>
      <div class="hex">#9C8B7A</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#7D6B5A;"></div>
      <div class="label">clay-500</div>
      <div class="hex">#7D6B5A</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#665847;"></div>
      <div class="label">clay-600</div>
      <div class="hex">#665847</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#524639;"></div>
      <div class="label">espresso-700</div>
      <div class="hex">#524639</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#3D352E;"></div>
      <div class="label">espresso-800</div>
      <div class="hex">#3D352E</div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#2A2520;"></div>
      <div class="label">charcoal-900</div>
      <div class="hex">#2A2520</div>
    </div>
  </div>
</body>
</html>
